<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* CSS căn bản tối ưu cho giao diện điện thoại */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--tg-theme-bg-color, #ffffff); /* Tự động lấy màu nền của Telegram */
            color: var(--tg-theme-text-color, #222222);       /* Tự động lấy màu chữ của Telegram */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            padding: 20px;
            max-width: 400px;
            width: 90%;
        }

        .user-card {
            background-color: var(--tg-theme-secondary-bg-color, #f4f4f5);
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        button {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            border: none;
            border-radius: 8px;
            background-color: var(--tg-theme-button-color, #2481cc); /* Màu nút mặc định của Telegram */
            color: var(--tg-theme-button-text-color, #ffffff);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Code Tech Mini App</h1>
        <p>Chào mừng bạn đã đến với giao diện Web App!</p>

        <div class="user-card" id="user-info">
            <p>Đang tải dữ liệu tài khoản...</p>
        </div>

        <button id="main-btn" onclick="sendDataBack()">Gửi dữ liệu về Bot</button>
        <button id="close-btn" onclick="closeApp()" style="background-color: #e53e3e; color: white; margin-top: 10px;">Đóng Ứng Dụng</button>
    </div>

    <script>
        // Khởi tạo đối tượng Telegram Web App
        const tg = window.Telegram.WebApp;

        // Mở rộng ứng dụng ra toàn màn hình điện thoại
        tg.expand();

        // Lấy thông tin user từ Telegram dữ liệu khởi tạo
        const user = tg.initDataUnsafe?.user;

        const userInfoDiv = document.getElementById('user-info');
        if (user) {
            userInfoDiv.innerHTML = `
                <p><strong>Xin chào:</strong> ${user.first_name} ${user.last_name || ''}</p>
                <p><strong>Username:</strong> @${user.username || 'Không có'}</p>
                <p><strong>ID:</strong> <code>${user.id}</code></p>
            `;
        } else {
            userInfoDiv.innerHTML = `<p style="color: red;">Không thể tải thông tin (Có thể bạn không mở từ Telegram).</p>`;
        }

        // Hàm gửi dữ liệu từ Web App ngược lại cho Bot (chỉ hoạt động khi mở dạng KeyboardButton WebApp)
        function sendDataBack() {
            const dataStr = JSON.stringify({ action: "click_button", user_id: user?.id });
            tg.sendData(dataStr); 
        }

        // Hàm đóng nhanh Web App
        function closeApp() {
            tg.close();
        }
    </script>
</body>
</html>
